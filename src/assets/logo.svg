<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B026FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Cyberpunk minimalist 'H' symbol -->
  <path d="M25 20 L25 80 M75 20 L75 80 M25 50 L75 50" fill="none" stroke="url(#gradient)" stroke-width="12" stroke-linecap="square" filter="url(#glow)"/>
  <rect x="25" y="20" width="12" height="12" fill="url(#gradient)" filter="url(#glow)"/>
  <rect x="63" y="68" width="12" height="12" fill="url(#gradient)" filter="url(#glow)"/>
</svg>
